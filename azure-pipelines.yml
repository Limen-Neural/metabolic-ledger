# Azure Pipelines for cross-platform parity (Linux, Windows, macOS)
# This yaml is used exclusively by the "full-ci" pipeline (id=5, renamed from long metabolic-ledger-full-ci) in the "CI CD" project under https://dev.azure.com/Limen-Neural .
# Matches GH CI + Docker build. Uses matrix as per review/plan.
# See #7 for full trifecta context. Validated structure for Azure YAML.
# (Legacy "metabolic-ledger-ci" id=4 duplicate definition removed to prevent double runs / "two rounds". The top-level "full-ci" check in GitHub is the standard matrix aggregator; the (Build linux/mac/windows) are the execution legs.)

trigger:
  - main

pr:
  - main

jobs:
- job: Build
  strategy:
    matrix:
      linux:
        imageName: 'ubuntu-latest'
      windows:
        imageName: 'windows-latest'
      mac:
        imageName: 'macos-latest'
  pool:
    vmImage: $(imageName)
  steps:
  - checkout: self

  - script: |
      rustup default stable
      rustup update stable
    displayName: 'Set Rust toolchain'

  - script: |
      rustc --version
      cargo --version
      cargo fmt -- --check
      cargo clippy --all-targets --all-features -- -D warnings
      cargo build --all-features
      cargo test --all-features
    displayName: 'Cargo checks with --all-features (all platforms)'

  - script: |
      echo "Azure pipeline succeeded for $(imageName). See #3 for accounting, #7 for CI."
    displayName: 'Summary'
