# Azure Pipelines for cross-platform parity (Linux, Windows, macOS)
# Matches GH CI + Docker build. Uses matrix as per review/plan.
# See #7 for full trifecta context. Validated structure for Azure YAML.

trigger:
  - main

pr:
  - main

jobs:
- job: Build
  strategy:
    matrix:
      linux:
        imageName: 'ubuntu-latest'
      windows:
        imageName: 'windows-latest'
      mac:
        imageName: 'macos-latest'
  pool:
    vmImage: $(imageName)
  steps:
  - checkout: self

  - script: |
      rustup default stable
      rustup update stable
    displayName: 'Set Rust toolchain'

  - script: |
      rustc --version
      cargo --version
      cargo fmt -- --check
      cargo clippy --all-targets --all-features -- -D warnings
      cargo build --all-features
      cargo test --all-features
    displayName: 'Cargo checks with --all-features (all platforms)'

  - script: |
      echo "Azure pipeline succeeded for $(imageName). See #3 for accounting, #7 for CI."
    displayName: 'Summary'
